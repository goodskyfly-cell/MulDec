<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>二位數乘法：列印優化系統</title>
    <style>
        /* A4 列印標準設定 */
        @page {
            size: A4;
            margin: 0;
        }
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
        }

        /* 導覽列：僅在螢幕顯示，列印時隱藏 */
        .nav-bar {
            background-color: #2c3e50;
            padding: 12px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-btn {
            padding: 10px 18px;
            margin: 0 5px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #34495e;
            color: white;
        }
        .nav-btn.active { background-color: #27ae60; }
        .print-btn { background-color: #e67e22; font-weight: bold; }

        /* A4 紙張容器 */
        .page {
            background: white;
            width: 210mm;
            height: 297mm;
            padding: 15mm 12mm; /* 設定內邊距，留出安全範圍 */
            margin: 20px auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            box-sizing: border-box; /* 極重要：確保 padding 不撐大寬度 */
            display: none;
            flex-direction: column;
            overflow: hidden; /* 防止任何內容溢出 */
        }
        .page.show { display: flex; }

        h1 { text-align: center; font-size: 24pt; margin: 0 0 10px 0; color: #333; }
        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 13pt;
            border-bottom: 2px solid #000;
            padding-bottom: 8px;
        }

        /* 模式一：50題 佈局 */
        .grid-50 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(10, 1fr);
            flex-grow: 1;
        }
        .item-50 {
            font-size: 18pt;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }
        .q-num { font-size: 9pt; color: #888; width: 25px; text-align: right; margin-right: 5px; }

        /* 模式二：15題 拆解佈局 (整合優化版) */
        .grid-15 {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 欄 */
            grid-template-rows: repeat(5, 1fr);   /* 5 列 */
            flex-grow: 1;
            gap: 8px; /* 縮小間距確保不溢出 */
        }
        .item-15 {
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }
        .main-q { 
            font-size: 18pt; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #2c3e50; 
            border-left: 4px solid #27ae60;
            padding-left: 8px;
        }
        .step-q { font-size: 13.5pt; color: #444; line-height: 1.6; }
        .line { display: inline-block; width: 55px; border-bottom: 1px solid #000; margin: 0 3px; }
        .hint { font-size: 9pt; color: #7f8c8d; }

        @media print {
            .nav-bar { display: none; }
            body { background: white; }
            .page { margin: 0; box-shadow: none; display: none; }
            .page.show { display: flex; }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="switchMode('mode1', this)">1. 整十數練習</button>
        <button class="nav-btn" onclick="switchMode('mode2', this)">2. 拆解法 (個位優先)</button>
        <button class="nav-btn print-btn" onclick="window.print()">🖨️ 列印此頁面</button>
        <button class="nav-btn" style="background-color: #7f8c8d;" onclick="location.reload()">🔄 換題</button>
    </div>

    <div id="mode1" class="page show">
        <h1>二位數乘法：整十數練習</h1>
        <div class="info-bar">
            <span>日期：___年___月___日</span>
            <span>姓名：__________</span>
            <span>得分：__________</span>
        </div>
        <div id="container1" class="grid-50"></div>
    </div>

    <div id="mode2" class="page">
        <h1>二位數乘法：拆解計算法</h1>
        <div class="info-bar">
            <span>姓名：__________</span>
            <span>重點：先算個位、再算十位、最後相加</span>
        </div>
        <div id="container2" class="grid-15"></div>
    </div>

    <script>
        function switchMode(modeId, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
            document.getElementById(modeId).classList.add('show');
        }

        function init() {
            // 第一頁產生 50 題
            const c1 = document.getElementById('container1');
            for (let i = 1; i <= 50; i++) {
                const tens = (Math.floor(Math.random() * 9) + 1) * 10;
                const m = Math.floor(Math.random() * 8) + 2;
                const div = document.createElement('div');
                div.className = 'item-50';
                div.innerHTML = `<span class="q-num">${i}.</span>${tens}×${m}=__`;
                c1.appendChild(div);
            }

            // 第二頁產生 15 題 (順序：個位 -> 十位)
            const c2 = document.getElementById('container2');
            for (let i = 1; i <= 15; i++) {
                const t_val = (Math.floor(Math.random() * 8) + 1) * 10;
                const o_val = (Math.floor(Math.random() * 8) + 1);
                const num = t_val + o_val;
                const mult = Math.floor(Math.random() * 8) + 2;
                const div = document.createElement('div');
                div.className = 'item-15';
                div.innerHTML = `
                    <div class="main-q">${i}. ${num} × ${mult} = ?</div>
                    <div class="step-q">
                        ① ${o_val}×${mult} = <span class="line"></span><span class="hint">(個位)</span><br>
                        ② ${t_val}×${mult} = <span class="line"></span><span class="hint">(十位)</span><br>
                        ③ 相加結果： <span class="line"></span>
                    </div>
                `;
                c2.appendChild(div);
            }
        }
        init();
    </script>
</body>
</html>
